<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Registro de Usuario | Inventario Pro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../css/styles.css">
  <style>
body {
  background: radial-gradient(ellipse at 60% 20%, #0d2d2a 0%, #0a0a0f 60%);
  min-height: 100vh;
  font-family: 'Inter', sans-serif;
}
.card { margin-top: 0; }
  </style>
</head>

<body>
  <div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card p-5 fade-up" style="width:28rem;">
      <div class="text-center mb-4">
        <h2 class="fw-bold" style="letter-spacing:-1px;color:#e2e8f0;">REGISTRO</h2>
      </div>

<form id="registerForm">
  <div class="mb-3">
    <label class="form-label fw-bold small">USUARIO</label>
    <input type="text" id="registerUsername" class="form-control" placeholder="admin" required />
  </div>
  <div class="mb-3">
    <label class="form-label fw-bold small">CONTRASEÑA</label>
    <input type="password" id="registerPassword" class="form-control" placeholder="****" required />
  </div>
  <div class="mb-3">
    <label class="form-label fw-bold small">EMAIL</label>
    <input type="email" id="registerEmail" class="form-control" placeholder="user@email.com" required />
  </div>


  <div id="registerAlert" class="alert alert-danger d-none py-2 small text-center">
    No se pudo registrar el usuario
  </div>

  <div class="d-flex gap-2">
<button type="submit" class="btn btn-teal w-100 py-3 fw-bold rounded-pill">REGISTRAR</button>
<button type="button" id="cancelBtn" class="btn w-100 py-3 fw-bold rounded-pill" style="background:rgba(255,255,255,0.05);color:#94a3b8;border:1px solid rgba(255,255,255,0.07);">CANCELAR</button>
  </div>
</form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../Javascript/scripts.js"></script>

   <footer class="app-footer mt-5">
    <div class="container-fluid py-5">
      <div class="row align-items-start">

        <!-- Left: same width as sidebar -->
        <div class="col-md-4">
          <h5 class="fw-bold text-white">Mobile Phone</h5>
        </div>

        <!-- Right: contact info -->
        <div class="col-md-8">
          <h6 class="fw-semibold text-white">Contacto</h6>
          <p class="footer-text mb-1">Bogotá - Colombia</p>
          <p class="footer-text mb-1">exclusive@gmail.com</p>
          <p class="footer-text">+601-8888-9999</p>
        </div>

      </div>
    </div>
  </footer>

  <div class="footer-bottom text-center py-3">
    © Copyright 2026. Todos los derechos reservados
  </div>
  </footer>
</body>

</html>
